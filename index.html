<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Intrams! - Sign up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, white, #ff7da8, #fea7c3, #ff518b);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column;
        }
        /* CUTE ANIMATION */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            padding: 15px 50px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        }

        .nav-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Chiikawa Logo */
        .logo {
            height: 40px;
            width: auto;
            object-fit: contain;
            
        }

        .brand-text {
            font-family: 'Shrikhand', cursive;
            font-size: 20px;
            color: #ff69b4; 
        }

        .nav-right a {
            margin-left: 35px;
            text-decoration: none;
            font-weight: 600;
            color: #303030;
            transition: 0.3s;
            position: relative;
        }

        .nav-right a:hover {
            color: #ff69b4;
        }

        .nav-right a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 3px;
            bottom: -6px;
            left: 0;
            background: #fdf8f9;
            transition: 0.3s;
            border-radius: 10px;
        }

        .nav-right a:hover::after {
            width: 100%;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            gap: 60px;
        }

        .image-box {
            width: 450px;
            height: 500px;
            border-radius: 30px;
            background: url('https://wallpaperaccess.com/full/11941884.png') center/cover no-repeat;
            box-shadow: 0 20px 40px rgba(255,182,189,0.4);
        }

        /* SIGNUP BOX */
        .signup-container {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            padding: 45px;
            width: 400px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        .signup-container h2 {
            margin-bottom: 30px;
            font-family: 'Bubblegum Sans', cursive;
            font-size: 34px;
            color: #ff69b4;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 20px;
            border: 2px solid #ffd7d5;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #fcbdc3;
            box-shadow: 0 0 10px rgba(255,182,189,0.5);
            outline: none;
        }

        .create-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff69b4, #fcbdc3);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .create-btn:hover {
            background: linear-gradient(90deg, #ff69b4, #fcbdc3);
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(255,182,189,0.5);
        }

        #message-box {
            margin-top: 18px;
            font-size: 14px;
            min-height: 20px;
        }

        .error {
            color: black;
            font-weight: bold;
        }

        .success {
            color: #ff69b4;
            font-weight: bold;
        }

        @media (max-width: 1000px) {
            .main-wrapper {
                flex-direction: column;
            }

            .image-box {
                width: 100%;
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-title">
            <img src="https://i.pinimg.com/originals/07/33/29/073329087de75dabc08563d0c75cc410.png" class="logo">
            <span class="brand-text">Intramurals SY 2025-2026</span>
        </div>

        <div class="nav-right">
            <a href="index.html">SIGN UP</a>
            <a href="teamchecker.html">TEAM CHECKER</a>
            <a href="players.html">PLAYERS</a>
        </div>
    </nav>

    <div class="main-wrapper">

        <div class="image-box"></div>

        <div class="signup-container">
            <h2>Sign Up!</h2>

            <div>
                <input type="text" id="userInput" class="input-field" placeholder="Enter username">
                <input type="password" id="passInput" class="input-field" placeholder="Enter password">
                <button py-click="validate_account" class="create-btn">Sign Up</button>
            </div>

            <div id="message-box"></div>
        </div>

    </div>

    <py-script src="index.py"></py-script>

</body>

</html>
